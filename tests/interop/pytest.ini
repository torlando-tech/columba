[pytest]
# Global per-test budget. Most tests run in <30s after fixture warm-up;
# the FIRST test in a session may absorb ~30-40s of emulator cold-start
# overhead from `columba_peer.start()`. 180s covers both.
timeout = 180
# pytest-timeout applies signal-mode by default which respects SIGALRM
# handlers; thread-mode is safer when subprocesses (adb) are involved.
timeout_method = thread

# Avoid Python deprecation warnings polluting CI output when running
# against host venvs that may have older transitive deps.
filterwarnings =
    ignore::DeprecationWarning

# Markers registered explicitly so pytest doesn't warn on `-m slow`.
markers =
    slow: PROPAGATED-method tests (>5 min runtime, lxmd-dependent).
          Skipped by default. Opt in via `pytest -m slow`.

# `addopts` provides the default exclusion. Override with explicit
# `-m slow` to include them.
addopts = -m "not slow"
