name: Manual Test Build

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Release name (optional, defaults to auto-generated)'
        required: false
        default: ''
      release_notes:
        description: 'Release notes (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
        continue-on-error: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        # Bumped from 20m: assembleRelease now also builds the two pythonBackend
        # flavors, which bundle a Python runtime per ABI via Chaquopy and are much
        # slower than the kotlinBackend flavors.
        timeout-minutes: 40
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        # assembleRelease builds all flavor combos: {sentry,noSentry} ×
        # {python,kotlin}Backend, each with ABI splits + universal.
        run: ./gradlew assembleRelease --stacktrace

      - name: Extract signing certificate fingerprints
        id: cert
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          CERT_INFO=$(keytool -list -v -keystore app/build/keystore/release.keystore \
            -alias "$KEY_ALIAS" -storepass "$KEYSTORE_PASSWORD")
          SHA256=$(echo "$CERT_INFO" | grep "SHA256:" | awk '{print $2}')
          SHA1=$(echo "$CERT_INFO" | grep "SHA1:" | awk '{print $2}')
          if [ -z "$SHA256" ] || [ -z "$SHA1" ]; then
            echo "::error::Failed to extract certificate fingerprints"
            exit 1
          fi
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "sha1=$SHA1" >> $GITHUB_OUTPUT
          echo "✓ Extracted certificate fingerprints"

      - name: Get branch name
        id: branch
        run: echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get timestamp
        id: timestamp
        run: echo "timestamp=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Get version from build
        id: version
        run: |
          VERSION=$(./gradlew -q printVersion | grep "versionName:" | cut -d' ' -f2)
          if [ -z "$VERSION" ]; then
            VERSION="unknown"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release Tag
        id: tag
        run: |
          TAG="prerelease-${{ steps.timestamp.outputs.timestamp }}-${{ steps.sha.outputs.sha }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Rename APKs by architecture and flavor
        run: |
          # Two flavor dimensions (telemetry × rnsImpl) mean Gradle writes to
          # app/build/outputs/apk/<telemetry><Backend>/release/, e.g.
          # sentryPythonBackend/release/. Output filenames:
          #   columba-{backend}-{abi}[-no-sentry].apk
          # Backend is python first, then kotlin.
          APK_DIR="app/build/outputs/apk"

          # "<dir-infix>:<filename-token>"
          for backend in "Python:official-rns-py" "Kotlin:EXPERIMENTAL-reticulum-kt"; do
            dir_backend="${backend%%:*}"
            name_backend="${backend##*:}"

            for telemetry in sentry noSentry; do
              sentry_suffix=""
              [ "$telemetry" = "noSentry" ] && sentry_suffix="-no-sentry"
              variant_dir="${telemetry}${dir_backend}Backend"

              for apk in "$APK_DIR/$variant_dir/release/"*.apk; do
                [ -e "$apk" ] || continue
                filename=$(basename "$apk")

                if echo "$filename" | grep -q "armeabi-v7a"; then
                  cp "$apk" "columba-${name_backend}-armeabi-v7a${sentry_suffix}.apk"
                elif echo "$filename" | grep -q "arm64-v8a"; then
                  cp "$apk" "columba-${name_backend}-arm64-v8a${sentry_suffix}.apk"
                elif echo "$filename" | grep -q "x86_64"; then
                  cp "$apk" "columba-${name_backend}-x86_64${sentry_suffix}.apk"
                elif echo "$filename" | grep -q "universal"; then
                  cp "$apk" "columba-${name_backend}-universal${sentry_suffix}.apk"
                fi
              done
            done
          done

          ls -la columba-*.apk
          echo "✓ Renamed APKs"

      - name: Generate SHA256 checksums
        run: |
          for apk in columba-*.apk; do
            sha256sum "$apk" > "${apk}.sha256"
          done
          echo "✓ Generated SHA256 checksums"

      - name: Read SHA256 checksums
        id: sha256
        run: |
          CHECKSUMS=""
          for checksum_file in columba-*.apk.sha256; do
            CHECKSUMS="${CHECKSUMS}$(cat "$checksum_file")\n"
          done
          echo "checksums<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHECKSUMS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Determine release name
        id: release_name
        env:
          INPUT_NAME: ${{ github.event.inputs.release_name }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          if [ -n "$INPUT_NAME" ]; then
            echo "name=$INPUT_NAME" >> $GITHUB_OUTPUT
          else
            echo "name=Pre-Release v${VERSION} (${SHA})" >> $GITHUB_OUTPUT
          fi

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.release_name.outputs.name }}
          body: |
            ## Pre-Release Build

            **Version:** ${{ steps.version.outputs.version }}
            **Branch:** `${{ steps.branch.outputs.branch }}`
            **Commit:** ${{ github.sha }}
            **Built:** ${{ steps.timestamp.outputs.timestamp }}

            This is a production-ready pre-release build with:
            - Release build configuration
            - ProGuard optimization enabled
            - Code minification enabled
            - No debug features

            Pick a **backend**, then download the APK matching your device's CPU architecture.

            - **Python backend, RECOMMENDED** — ships Mark Qvist's official python reference implementations of Reticulum and LXMF via Chaquopy.
            - **Kotlin backend** — ships Torlando's EXPERIMENTAL, AI-GENERATED native reticulum-kt / lxmf-kt / lxst-kt stack.

            The python version is highly recommended. The kotlin version is a work in progress, and is not yet verified to be completely safe.
            The kotlin version may yield better battery life depending on your device, and comes in a smaller apk due to not requiring a python runtime.

            **Python backend — by architecture (with crash reporting):**
            - `columba-official-rns-py-armeabi-v7a.apk` — Older 32-bit ARM phones (armeabi-v7a)
            - `columba-official-rns-py-arm64-v8a.apk` — Most modern Android phones (arm64-v8a)
            - `columba-official-rns-py-x86_64.apk` — Chromebooks & emulators (x86_64)
            - `columba-official-rns-py-universal.apk` — Universal fallback (all architectures)

            **Kotlin backend — by architecture (with crash reporting):**
            - `columba-EXPERIMENTAL-reticulum-kt-armeabi-v7a.apk` — Older 32-bit ARM phones (armeabi-v7a)
            - `columba-EXPERIMENTAL-reticulum-kt-arm64-v8a.apk` — Most modern Android phones (arm64-v8a)
            - `columba-EXPERIMENTAL-reticulum-kt-x86_64.apk` — Chromebooks & emulators (x86_64)
            - `columba-EXPERIMENTAL-reticulum-kt-universal.apk` — Universal fallback (all architectures)

            **Telemetry variants:**
            Each APK above also has a matching `-no-sentry` variant (e.g. `columba-official-rns-py-arm64-v8a-no-sentry.apk`) without crash reporting for maximum privacy. Sentry collects stack traces when Columba encounters errors
            and provides helpful information to the developer to improve Columba, but is hosted at sentry.io, and is thus not the maximum privacy option.

            > **Not sure which to pick?** Most Android phones use **arm64-v8a**. If unsure, use the **universal** APK.

            ${{ github.event.inputs.release_notes }}

            ### Verification
            See [SECURITY.md](https://github.com/torlando-tech/columba/blob/main/SECURITY.md) for verification instructions.

            **Signing Certificate Fingerprints:**
            ```
            SHA-256: ${{ steps.cert.outputs.sha256 }}
            SHA-1:   ${{ steps.cert.outputs.sha1 }}
            ```

            **SHA256 Checksums:**
            ```
            ${{ steps.sha256.outputs.checksums }}
            ```

            ### Installation
            Download the APK matching your device and install it.

            **Note:** You may need to enable "Install from Unknown Sources" in your device settings.
          files: |
            columba-*.apk
            columba-*.apk.sha256
          draft: false
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APKs as artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: app-release-${{ steps.sha.outputs.sha }}
          path: columba-*.apk
          # Short retention: these also attach to the prerelease (which doesn't
          # count toward Actions storage). 1 day keeps them handy for a quick
          # download (e.g. sideloading to a phone) without piling up the quota.
          retention-days: 1
